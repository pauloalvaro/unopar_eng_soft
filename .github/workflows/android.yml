name: Android CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:  # <-- Corrigido: Agora com 2 espaços de recuo
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      # Corrigido: Apenas um 'run' e com flags de segurança para CI
      run: ./gradlew assembleDebug --no-daemon --console=plain --info

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
