name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Atualizado para v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4 # Atualizado para v4
        with:
          java-version: '17' # Versão compatível com os logs de sucesso anteriores
          distribution: 'temurin'
          cache: gradle # Caching automático integrado, substitui o passo manual

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Lint
        # Adicionadas flags para evitar travamento em ambiente CI
        run: ./gradlew lint --no-daemon --console=plain

      - name: Run Unit Tests
        run: ./gradlew test --no-daemon --console=plain

      - name: Build
        run: ./gradlew assembleDebug --no-daemon --console=plain

      - name: Archive Build Artifacts
        uses: actions/upload-artifact@v4 # Atualizado para v4
        with:
          name: android-build-artifacts
          path: app/build/outputs/apk/debug/
