name: Android CI

on: [push, pull_request]

jobs:
  build: # Corrigido: Indentação de 2 espaços para evitar erro de sintaxe
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2 # Conforme solicitado (versão antiga)

      - name: Setup JDK
        uses: actions/setup-java@v1 # Conforme solicitado (versão antiga)
        with:
          java-version: '11' # Versão antiga solicitada

      - name: Cache Gradle dependencies
        uses: actions/cache@v2 # Conforme solicitado (versão antiga)
        with:
          path: ~/.gradle/caches/
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Lint
        # Adicionado --no-daemon para evitar o travamento de 4 horas
        run: ./gradlew lint --no-daemon --console=plain

      - name: Run Unit Tests
        run: ./gradlew test --no-daemon --console=plain

      - name: Build
        # assembleDebug gera o APK para testes
        run: ./gradlew assembleDebug --no-daemon --console=plain

      - name: Archive Build Artifacts
        uses: actions/upload-artifact@v2 # Conforme solicitado (versão antiga)
        with:
          name: android-build-artifacts
          path: app/build/outputs/apk/
